<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;padding:1.5rem;color:#212529}
.cal-wrap{max-width:1300px;margin:0 auto}
h2{font-size:17px;font-weight:500;color:#212529}
.subtitle{font-size:13px;color:#6c757d;margin-top:3px;margin-bottom:1.25rem}
.month-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.mpill{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #dee2e6;background:#fff;color:#6c757d;cursor:pointer;white-space:nowrap;transition:all .15s}
.mpill:hover{background:#f1f3f5}
.mpill.active{background:#212529;color:#fff;border-color:#212529}
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:.5rem}
.nav-btn{font-size:12px;padding:5px 14px;border-radius:6px;border:0.5px solid #ced4da;background:#fff;color:#212529;cursor:pointer;font-weight:500;transition:background .15s}
.nav-btn:hover{background:#f1f3f5}
.month-title{font-size:20px;font-weight:500;color:#212529;flex:1;text-align:center}
.month-theme{font-size:12px;color:#6c757d;text-align:center;font-style:italic;margin-bottom:.6rem}
.events-bar{font-size:11px;color:#495057;background:#fff;border:0.5px solid #e9ecef;border-radius:6px;padding:6px 12px;margin-bottom:1rem;line-height:1.6}
.events-bar strong{color:#212529;font-weight:500}
.controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid #ced4da;background:#fff;color:#6c757d;cursor:pointer;transition:all .15s}
.filter-btn:hover{background:#f1f3f5}
.filter-btn.active{color:#212529;font-weight:500;background:#f1f3f5;border-color:#adb5bd}
.legend{display:flex;flex-wrap:wrap;gap:5px 14px;margin-bottom:.85rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6c757d}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.dow-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.dow-cell{text-align:center;font-size:11px;font-weight:500;color:#adb5bd;padding:4px 0;letter-spacing:.03em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{background:#fff;border:0.5px solid #e9ecef;border-radius:7px;min-height:110px;padding:6px 5px 5px;overflow:hidden}
.day-cell.empty{background:#f8f9fa;border-color:transparent;min-height:110px}
.day-num{font-size:11px;font-weight:600;color:#adb5bd;margin-bottom:4px;padding:0 1px}
.post-chip{border-radius:4px;padding:4px 5px;margin-bottom:3px;border-left:2px solid transparent;cursor:pointer;transition:opacity .1s;display:block;width:100%}
.post-chip:hover{opacity:.78}
.post-chip.hidden{display:none}
.chip-label{font-size:9px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.chip-plat{font-size:9px;opacity:.7;line-height:1.2;margin-top:1px;display:block}

/* drawer overlay */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:340px;background:#fff;border-left:0.5px solid #dee2e6;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:16px 18px 12px;border-bottom:0.5px solid #f1f3f5;display:flex;align-items:flex-start;gap:10px}
.drawer-date{font-size:13px;font-weight:600;color:#212529;flex:1}
.drawer-count{font-size:11px;color:#6c757d;margin-top:2px}
.drawer-close{background:none;border:none;font-size:20px;color:#adb5bd;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.drawer-close:hover{color:#212529}
.drawer-body{flex:1;overflow-y:auto;padding:12px 18px}
.post-block{border:0.5px solid #e9ecef;border-radius:8px;padding:12px;margin-bottom:10px}
.post-block:last-child{margin-bottom:0}
.pb-header{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.pb-bucket{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.pb-plat{font-size:11px;color:#6c757d}
.pb-row{display:flex;gap:6px;margin-bottom:5px;align-items:baseline}
.pb-label{font-size:10px;font-weight:600;color:#adb5bd;min-width:52px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.pb-val{font-size:12px;color:#212529;line-height:1.45}
.pb-cta{font-size:11px;font-style:italic;color:#495057;background:#f8f9fa;border-radius:4px;padding:5px 8px;margin-top:6px}
</style>
</head>

  </div>

</div>

</div>

let curIdx=0, curFilter='all';
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCal();
}
function changeMonth(d){
  curIdx=Math.max(0,Math.min(MONTHS.length-1,curIdx+d));
  buildPills(); renderCal();
}
function buildPills(){
  const c=document.getElementById('monthPills'); c.innerHTML='';
  MONTHS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='mpill'+(i===curIdx?' active':'');
    b.textContent=m.name;
    b.onclick=()=>{curIdx=i;buildPills();renderCal();};
    c.appendChild(b);
  });
}
function matches(p){
  if(curFilter==='all') return true;
  if(curFilter==='ig') return p.plat==='ig'||p.plat==='both';
  if(curFilter==='fb') return p.plat==='fb'||p.plat==='both';
  if(curFilter==='both') return p.plat==='both';
  if(curFilter==='email') return p.plat==='email';
  return p.bucket===curFilter;
}
function openDrawer(day, posts){
  const md=MONTHS[curIdx];
  const dow=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const d=new Date(md.y,md.m,day);
  document.getElementById('drawerDate').textContent=dow[d.getDay()]+', '+MN[md.m]+' '+day+', '+md.y;
  document.getElementById('drawerCount').textContent=posts.length+' scheduled post'+(posts.length>1?'s':'');
  document.getElementById('drawerBody').innerHTML=posts.map(p=>{
    const bs=BS[p.bucket]||{bg:'#eee',color:'#555',label:p.bucket};
    return `<div class="post-block">
      <div class="pb-header">
        <span class="pb-bucket" style="background:${bs.bg};color:${bs.color}">${bs.label}</span>
        <span class="pb-plat">${PI[p.plat]||''} ${PL[p.plat]||p.plat}</span>
      </div>
      <div class="pb-row"><span class="pb-label">Format</span><span class="pb-val">${p.type}</span></div>
      <div class="pb-row"><span class="pb-label">Content</span><span class="pb-val">${p.desc}</span></div>
      <div class="pb-cta">CTA: ${p.cta}</div>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function renderCal(){
  const md=MONTHS[curIdx];
  document.getElementById('monthTitle').textContent=md.name;
  document.getElementById('monthTheme').textContent=md.theme;
  document.getElementById('eventsBar').innerHTML='<strong>Key events:</strong> '+md.events.join('  &nbsp;&middot;&nbsp;  ');
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const daysInMonth=new Date(md.y,md.m+1,0).getDate();
  const firstDow=new Date(md.y,md.m,1).getDay();
  const byDay={};
  md.posts.forEach(p=>{if(!byDay[p.d])byDay[p.d]=[];byDay[p.d].push(p);});
  for(let i=0;i<firstDow;i++){
    const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);
  }
  for(let day=1;day<=daysInMonth;day++){
    const cell=document.createElement('div'); cell.className='day-cell';
    const numDiv=document.createElement('div'); numDiv.className='day-num'; numDiv.textContent=day;
    cell.appendChild(numDiv);
    const posts=byDay[day]||[];
    posts.forEach(p=>{
      const bs=BS[p.bucket]||{bg:'#eee',color:'#555',label:p.bucket};
      const chip=document.createElement('div');
      chip.className='post-chip'+(matches(p)?'':' hidden');
      chip.style.background=bs.bg;
      chip.style.borderLeftColor=bs.color;
      chip.innerHTML=
        `<span class="chip-label" style="color:${bs.color}">${bs.label}</span>`+
        `<span class="chip-plat" style="color:${bs.color}">${PI[p.plat]||''} ${p.type}</span>`;
      chip.onclick=(e)=>{e.stopPropagation();openDrawer(day,posts);};
      cell.appendChild(chip);
    });
    grid.appendChild(cell);
  }
  const total=firstDow+daysInMonth;
  const rem=(7-(total%7))%7;
  for(let i=0;i<rem;i++){
    const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);
  }
}
buildPills(); renderCal();
</script>
